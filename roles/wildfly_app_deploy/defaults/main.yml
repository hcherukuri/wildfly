---
# Path to the application artifact (.war, .ear, .jar) on the Ansible controller
wildfly_app_deploy_file: "/path/to/your/application.war"

# The name to use for the deployment in WildFly (e.g., app-v1.war)
wildfly_app_deploy_name: "application.war"

# Deployment mode: 'standalone' or 'domain'
wildfly_app_deploy_mode: "standalone"

# List of server groups to deploy to (Required if wildfly_app_deploy_mode is 'domain')
# Example: ['main-server-group', 'other-server-group']
wildfly_app_deploy_server_groups: []

# WildFly installation directory (defaults to wildfly_home from wildfly_install role)
# This will inherit from wildfly_install role or can be set explicitly
# jboss_home will inherit from wildfly_utils role defaults (which sets it to wildfly_home)

# JBoss CLI Connection details
# These will inherit from wildfly_utils role defaults if not set
jboss_cli_controller_host: "localhost"
jboss_cli_controller_port: "9990"
wildfly_port_range_offset: 0

# Privilege escalation for file operations and CLI commands
wildfly_app_deploy_requires_privilege_escalation: true

# User and password for CLI authentication (optional, if management interface requires auth)
# Note: These are currently not used by the wildfly_utils jboss_cli task
# Authentication should be configured at the WildFly management interface level
wildfly_app_deploy_cli_user: ""
wildfly_app_deploy_cli_password: ""
